<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sticky Notes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      position: relative;
      z-index: 10;
    }

    h1 { font-size: 1.4rem; color: #333; }

    button.add-btn {
      padding: 8px 16px;
      background: #f5c400;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
    }

    button.add-btn:hover { background: #e0b200; }

    .board {
      position: relative;
      width: 100%;
      height: calc(100vh - 60px);
    }

    .note {
      background: #fff9a3;
      width: 200px;
      min-height: 160px;
      border-radius: 4px;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      padding: 10px;
      position: absolute;
      cursor: default;
      user-select: none;
    }

    .note.dragging {
      box-shadow: 6px 6px 16px rgba(0,0,0,0.25);
      z-index: 100;
    }

    .note .drag-handle {
      height: 18px;
      cursor: grab;
      margin-bottom: 4px;
    }

    .note .drag-handle:active { cursor: grabbing; }

    .note textarea {
      flex: 1;
      border: none;
      background: transparent;
      resize: none;
      font-size: 0.95rem;
      font-family: sans-serif;
      outline: none;
      color: #333;
      min-height: 120px;
      cursor: text;
      user-select: text;
    }

    .note .delete-btn {
      position: absolute;
      top: 4px;
      right: 8px;
      background: none;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      color: #aaa;
      line-height: 1;
    }

    .note .delete-btn:hover { color: #e00; }
  </style>
</head>
<body>
  <header>
    <h1>Sticky Notes</h1>
    <button class="add-btn" onclick="addNote()">+ New Note</button>
  </header>
  <div class="board" id="board"></div>

  <script>
    const board = document.getElementById('board');

    function getNotes() {
      return JSON.parse(localStorage.getItem('sticky-notes') || '[]');
    }

    function saveNotes(notes) {
      localStorage.setItem('sticky-notes', JSON.stringify(notes));
    }

    function render() {
      board.innerHTML = '';
      getNotes().forEach((note, i) => {
        const el = document.createElement('div');
        el.className = 'note';
        el.style.left = note.x + 'px';
        el.style.top = note.y + 'px';
        el.style.zIndex = note.z || i + 1;
        el.innerHTML = `
          <div class="drag-handle">···</div>
          <button class="delete-btn" onclick="deleteNote(${i})">✕</button>
          <textarea placeholder="Type your note...">${note.text}</textarea>
        `;

        el.querySelector('textarea').addEventListener('input', e => {
          const notes = getNotes();
          notes[i].text = e.target.value;
          saveNotes(notes);
        });

        makeDraggable(el, i);
        board.appendChild(el);
      });
    }

    function makeDraggable(el, i) {
      const handle = el.querySelector('.drag-handle');
      let startX, startY, startLeft, startTop;

      handle.addEventListener('mousedown', e => {
        e.preventDefault();
        const notes = getNotes();
        const maxZ = Math.max(...notes.map(n => n.z || 1));
        notes[i].z = maxZ + 1;
        saveNotes(notes);
        el.style.zIndex = maxZ + 1;

        startX = e.clientX;
        startY = e.clientY;
        startLeft = parseInt(el.style.left) || 0;
        startTop = parseInt(el.style.top) || 0;
        el.classList.add('dragging');

        function onMove(e) {
          const dx = e.clientX - startX;
          const dy = e.clientY - startY;
          el.style.left = Math.max(0, startLeft + dx) + 'px';
          el.style.top = Math.max(0, startTop + dy) + 'px';
        }

        function onUp() {
          el.classList.remove('dragging');
          const notes = getNotes();
          notes[i].x = parseInt(el.style.left);
          notes[i].y = parseInt(el.style.top);
          saveNotes(notes);
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        }

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    }

    function addNote() {
      const notes = getNotes();
      const offset = notes.length * 20;
      notes.push({ text: '', x: 40 + offset, y: 40 + offset, z: notes.length + 1 });
      saveNotes(notes);
      render();
      board.lastChild.querySelector('textarea').focus();
    }

    function deleteNote(i) {
      const notes = getNotes();
      notes.splice(i, 1);
      saveNotes(notes);
      render();
    }

    render();
  </script>
</body>
</html>
